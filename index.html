<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paint — Браузерний Графічний Редактор</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside id="toolbar">
      <div class="toolbar-section">
        <span class="section-label">Інструменти</span>
        <div class="tool-grid">
          <button class="tool-btn active" data-tool="pencil">✏️</button>
          <button class="tool-btn" data-tool="eraser">🧹</button>
        </div>
      </div>
      <div class="toolbar-section">
        <span class="section-label">Колір</span>
        <input type="color" id="colorPicker" value="#000000" />
      </div>
      <div class="toolbar-section">
        <span class="section-label">Дії</span>
        <button class="action-btn" id="clearBtn">🗑 Очистити</button>
      </div>
    </aside>
    <main id="canvas-area">
      <canvas id="mainCanvas"></canvas>
    </main>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
